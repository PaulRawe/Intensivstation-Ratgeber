name: Remove KDP Books Block from Frageseiten

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/inject-kdp-books.yml'

jobs:
  remove-kdp-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove KDP block from fragen/*.html
        run: |
          python3 << 'PYEOF'
          import os
          import glob
          import re

          files = glob.glob('fragen/*.html')
          updated = 0
          skipped = 0

          for filepath in files:
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()

              if 'KDP_BOOKS_START' not in content:
                  skipped += 1
                  continue

              # Alles zwischen den Markern (inkl. Marker) entfernen
              new_content = re.sub(
                  r'\s*<!-- KDP_BOOKS_START -->.*?<!-- KDP_BOOKS_END -->',
                  '',
                  content,
                  flags=re.DOTALL
              )

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              updated += 1
              print(f'  ✓ bereinigt: {filepath}')

          print(f'\nFertig: {updated} Seiten bereinigt, {skipped} ohne Block übersprungen.')
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fragen/*.html
          git diff --staged --quiet || git commit -m "cleanup: KDP Bücher Block aus allen Frageseiten entfernt"
          git push
